    source_site: 南开新闻网
    category: news
    allowed_domains:
      - news.nankai.edu.cn
    start_urls:
      - https://news.nankai.edu.cn/ywsd/index.shtml
      - https://news.nankai.edu.cn/mtnk/index.shtml
      - https://news.nankai.edu.cn/zhxw/index.shtml
      - https://news.nankai.edu.cn/nkrw/index.shtml
    max_pages: 8000
    output: data/jsonl/batches/news_main.jsonl

