# Batch crawl configuration — each batch runs independently with its own JSONL output.
# Global dedup is handled later by incremental_index (normalized_url + content_hash).

# Default settings applied to all batches unless overridden
defaults:
  download_delay: 0.5
  concurrent_per_domain: 2
  obey_robots: true
  autothrottle: true
  depth_limit: 8
  max_pages: 5000

